
<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qisada - QISOOYIN</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --primary-color: #2ecc71;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --footer-bg: #2c3e50;
            --footer-text: #bdc3c7;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f4f7f6;
            --card-bg: #2d2d2d;
            --primary-color: #2ecc71;
            --header-bg: #111111;
            --header-text: #ffffff;
            --footer-bg: #111111;
            --footer-text: #888888;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 25px 20px; /* Waa la weyneeyey */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px; /* Waa la weyneeyey */
        }

        .back-btn, .dark-mode-btn {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover, .dark-mode-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .qiso-full-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Sawirka weyn ee gudaha qisada */
        .qiso-banner-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .qiso-full-card-content {
            padding: 40px;
        }

        .qiso-full-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 36px; /* Aad baa loo weyneeyey cinwaanka gudaha (wuxuu ahaa 28px) */
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .qiso-content {
            font-size: 19px; /* Qoraalka sheekada laftiisa wax yar baa la weyneeyey si uu indhaha u uroon yahay */
            line-height: 1.8;
            margin-top: 20px;
            white-space: pre-line;
        }

        /* Naqshadda Footer-ka */
        footer {
            background-color: var(--footer-bg);
            color: var(--footer-text);
            text-align: center;
            padding: 20px;
            font-size: 16px;
            margin-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ Dib u laabo</a>
        <h1>📖 QISOOYIN</h1>
        <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </header>

    <div class="container">
        <div class="qiso-full-card">
            <!-- Sawirka weyn ee sare ka soo muuqanaya -->
            <img id="qisoBanner" src="" alt="Qiso Banner" class="qiso-banner-img" style="display: none;">
            
            <div class="qiso-full-card-content">
                <h2 id="qisoTitle">Soo raraya...</h2>
                <div class="qiso-content" id="qisoBody">
                    Fadlan sug, qisada waa la soo rarayaa...
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER-KA CUSUB -->
    <footer>
        @2026 QISOOYIN - Xuquuqda wey dhowran tahay
    </footer>

    <script>
        // Qisooyinka kaydsan (oo hadda wata sawirradii)
        const database = {
            "samirka-iyo-guusha": {
                title: "Samirka iyo Guusha",
                image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80",
                content: "Waqti hore, waxaa jiray nin dhalinyaro ah oo rabay inuu hanti dhalo laakiin dhibaatooyin banyak ayaa ka hor yimid. Maalin kasta wuxuu la kulmi jiray guuldarrooyin dhowr ah. \n\nMaalin maalmaha ka mid ah wuxuu u tagay oday waayeel ah oo caqli bacon si uu u weydiiyo sirta guusha. Odaygii wuxuu ku yiri: 'Sirta guushu waa inaad samirto, markaad dhaddisana aad mar kale istaagto.' \n\nNinkii dhalinyarada ahaa wuxuu qaatay taladii odayga. Wuxuu bilaabay ganacsi cusub isagoo samirka ka dhigtay hubkiisa koobaad. Sanado ka dib, wuxuu noqday mid ka mid ah dadka ugu guusha iyo hantida badan magaalada."
            },
            "dhabada-toosan": {
                title: "Dhabada Toosan",
                image: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80",
                content: "Daacadnimadu waa dhabada ka kaliya ee qofka u horseedda xasillooni maskaxeed iyo guul waarta. \n\nQisadan waxay ku saabsan tahay wiil yar oo lagu magacaabi jiray Cali, kaas oo helay boorsadii ay ku jireen lacagaha ugu muhiimsanaa ee ganacsade weyn oo magaalada joogay. Cali inkastoo uu sabool ahaa, haddana wuxuu go'aansaday inuu boorsada u celiyo ninkii lahaa isagoo aan waxba ka taaban. \n\nGanacsadihii markuu arkay daacadnimada Cali, wuxuu u damaanad qaaday waxbarashadiisa oo dhan, markii uu weynaadayna wuxuu ka dhigtay maareeyaha guud ee shirkadiisa."
            },
            "aamina-iyo-riyadeeda": {
                title: "Aamina iyo Riyadeeda",
                image: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=800&q=80",
                content: "Aamina waxay ahayd gabadh dhalinyaro ah oo ku nool miyiga, waxayna aad u jeclayd inay maalin maalmaha ka mid ah noqoto dhakhtarad daryeesha dadkeeda. \n\nIn kasta oo aysan deegaankeeda ka jirin dugsiyo sare iyo jaamacado, haddana taasi kama hakin riyadeeda. Waxay u guurtay magaalada si ay u sii wadato waxbarashada iyadoo la tacaalaysa dhibaatooyinka nolosha iyo duruufaha dhaqaale. \n\nSannado badan oo dadaal iyo dhabar-adayg ah ka dib, Aamina waxay ku guulaysatay inay dhammayso kulliyadda caafimaadka, maantana waa dhakhtarad caan ah oo dadkeeda u adeegta."
            },
            "nuurkii-indhaheyga": {
                title: "Nuurkii Indhaheyga (Aragtida Gabadha)",
                image: "https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=800&q=80",
                content: "Sumaya waxay ahayd gabadh aad u jecel sawirista iyo fanka, laakiin dhibaato dhinaca aragga ah ayaa ku dhalatay oo ka hor-istaagi jirtay inay adduunka si cad u aragto. Maalin maalmaha ka mid ah, iyadoo joogta goob lagu soo bandhigo farshaxanka, ayay is barteen Nuur oo ahaa wiil dhallinyaro ah oo qoraa ah. Nuur ma noqon kaliya saaxiib, laakiin wuxuu noqday qofka u sharraxa quruxda dunida ee aysan indhaheedu qaban karin. \n\n\"Wuxuu ii ahaa indho aan wax ku arko, wax walba oo uu ii sharraxana waxay qalbigeyga ku abuuri jireen sawir ka qurux badan midka ay dadka kale arkaan,\" ayay tiri Sumaya maalin ay xusuusanaysay bilowgii jaceylkooda. \n\nJaceylkoodu wuxuu ku dhisnaa kalsooni iyo dareen qoto dheer. Markii dambe oo ay Sumaya heshay caawimaad caafimaad oo indhaheeda wax looga qabtay, qofkii ugu horreeyey ee ay rabtay inay aragto wuxuu ahaa Nuur—iyadoo ogaatay in nuurka runta ah uu ahaa naxariista ku jirtay wadnihiisa."
            },
            "qoraalkii-ugu-dambeeyey": {
                title: "Qoraalkii Ugu Dambeeyey (Aragtida Wiilka)",
                image: "https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?auto=format&fit=crop&w=800&q=80",
                content: "Khaalid wuxuu ahaa wiil dabeecad deggan oo ka shaqeeya maktabad weyn. Maalin kasta, wuxuu arki jiray gabadh magaceeda la yiraahdo Leyla oo timaada maktabada si ay wax u akhrisato. Khaalid wuxuu ahaa qof xishood badan oo aan ku dhiiran karin inuu la hadlo, laakiin wuxuu go'aansaday inuu dareenkiisa ugu sheego qaab ka duwan kuwii caadiga ahaa. Wuxuu bilaabay inuu buugaagta ay akhrisato dhex dhigo waraaqo yaryar oo ay ku qoran yihiin erayo dhiirigelin iyo jaceyl isugu jira. \n\nHabeenkii uu go'aansaday inuu u sheego inuu isagu waraaqaha u qori jiray, wuxuu ku yiri:\n'Buug walba oo aan kuu xushay wuxuu ahaa cutub ka mid ah jaceylka aan kuu qabo, xaraf walba oo ku qornaana wuxuu ahaa codka wadnaheyga.' \n\nLeyla weji furnaan iyo farxad ayay ku qaabishay, waxayna u sheegtay inay horay u ogaatay inuu isagu yahay qofka qoraalka u reebi jiray, balse ay sugeysey goorta uu geesinimada la imaan doono."
            },
            "jidka-tareenka-iyo-kulankii-qaddarka": {
                title: "Jidka Tareenka iyo Kulankii Qaddarka (Wada Jir)",
                image: "https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=800&q=80",
                content: "Cumar iyo Fardowsa waxay ahaayeen laba qof oo maalin kasta ku kulmi jiray saldhigga tareenka xilliga subaxdii marka loo socdo shaqada. Waxay isku weydaarsan jireen kaliya dhoola-caddayn iyo salaan kooban muddo ku dhow sannad, laakiin midkoodna kuma dhiiran jirin inuu tallaabo kale qaado. Maalin maalmaha ka mid ah, tareenkii ayaa cilad ku timid, waxaana lagu khasbay inay bas wada raacaan. \n\nHalkaas ayay sheeko rasmi ah ka bilaabatay, waxayna ogaadeen inay wadaagaan dano badan oo dhinaca nolosha ah. Ayagoo wada fadhiya makhaayad ay kafeega ka cabayeen, ayay isku yiraahdeen:\n\nCumar: 'Haddii uusan tareenku maanta haysan lahayn cilad, laga yaabaa inaan weli iska eegi lahayn meel fog.'\nFardowsa: 'Malaha ma ahayn cilad tareen, waxay ahayd qaddarka oo na rabay inaan ugu dambeyn wada hadalno.' \n\nKulankaas wuxuu noqod bilowgii safar nololeed oo dheer, maantana safarkooda tareenka subax kasta ma aha mid cidlo ah, ee waa mid ay gacmaha is haystaan iyagoo qorshaynaya mustaqbalkooda \n\Cumar iyo Fardowsa waa ay is guursadeen, waxaynaisku dhaleen toban caruur, shan wiil iyo shan gabdhood. \n\Cumar iyo Farowsa waxay wada qaateen nolol farxad leh."
            }
        };

        // Marka boggu baxo (Load)
        document.addEventListener("DOMContentLoaded", () => {
            // Dark Mode check
            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.querySelector('.dark-mode-btn').innerText = "☀️ Light Mode";
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.querySelector('.dark-mode-btn').innerText = "🌙 Dark Mode";
            }

            // Soo rarista Qisada
            const urlParams = new URLSearchParams(window.location.search);
            const qisoId = urlParams.get('id');

            if (qisoId && database[qisoId]) {
                document.getElementById('qisoTitle').innerText = database[qisoId].title;
                document.getElementById('qisoBody').innerText = database[qisoId].content;
                document.title = database[qisoId].title + " - QISOOYIN";
                
                // Soo rar sawirka oo muuji
                const banner = document.getElementById('qisoBanner');
                banner.src = database[qisoId].image;
                banner.style.display = "block";
            } else {
                document.getElementById('qisoTitle').innerText = "Qisada lama helin!";
                document.getElementById('qisoBody').innerText = "Waan ka xunnahay, qisadan laguma hayo diiwaanka.";
            }
        });

        // Dark Mode toggle
        function toggleDarkMode() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                document.querySelector('.dark-mode-btn').innerText = "🌙 Dark Mode";
                localStorage.setItem("theme", "light");
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.querySelector('.dark-mode-btn').innerText = "☀️ Light Mode";
                localStorage.setItem("theme", "dark");
            }
        }
    </script>

</body>
</html>
